# vLLM + Qwen2.5-32B-Instruct (dense). Works with vLLM 0.8.x / older Transformers.
# Model: https://huggingface.co/Qwen/Qwen2.5-32B-Instruct
# Qwen3.5-35B-A3B: use docker-compose-vllm-gh200-qwen35-35b.yaml (vllm-openai + Transformers 5 MoE stack).
# Default image here: vllm/vllm-openai (typical x86_64). ARM64 + H100/GH200: docker-compose-vllm-gh200.yaml.
# Merge with main stack:
#   docker compose -f docker-compose.yaml -f docker-compose-vllm.yaml up -d
# Or vLLM only:
#   docker compose -f docker-compose-vllm.yaml up -d
# Repo-root .env (gitignored): HF_TOKEN=... for gated models. Loaded via env_file below.

services:
  model-download:
    image: python:3.12-slim
    env_file:
      - path: .env
        required: false
    volumes:
      - ./vllm-models:/models
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python -m pip install -q --no-cache-dir huggingface_hub hf_transfer
        export HF_HUB_ENABLE_HF_TRANSFER=1
        if [ -f /models/Qwen2.5-32B-Instruct/config.json ]; then
          echo "Model already present; skipping download."
          exit 0
        fi
        echo "Downloading Qwen/Qwen2.5-32B-Instruct (large, one-time)..."
        python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Qwen/Qwen2.5-32B-Instruct', local_dir='/models/Qwen2.5-32B-Instruct', local_dir_use_symlinks=False)"
    restart: "no"

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    env_file:
      - path: .env
        required: false
    depends_on:
      model-download:
        condition: service_completed_successfully
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_HOME=/models/.cache/huggingface
    ports:
      - "8000:8000"
    ipc: host
    shm_size: 16gb
    gpus: all
    command:
      - "/models/Qwen2.5-32B-Instruct"
      - "--served-model-name"
      - "Qwen/Qwen2.5-32B-Instruct"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "32768"
      - "--gpu-memory-utilization"
      - "0.90"
      # Required for OpenAI-compatible clients (e.g. OpenClaw) that send tool_choice: "auto"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
    restart: unless-stopped
