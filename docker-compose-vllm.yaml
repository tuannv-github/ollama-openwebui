# vLLM + Qwen3.5-35B (HF: Qwen/Qwen3.5-35B-A3B). Merge with main stack:
#   docker compose -f docker-compose.yaml -f docker-compose-vllm.yaml up -d
# Or vLLM only:
#   docker compose -f docker-compose-vllm.yaml up -d
# Optional: HF_TOKEN=... if the hub asks for auth.

services:
  model-download:
    image: python:3.12-slim
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python -m pip install -q --no-cache-dir huggingface_hub hf_transfer
        export HF_HUB_ENABLE_HF_TRANSFER=1
        if [ -f /models/Qwen3.5-35B-A3B/config.json ]; then
          echo "Model already present; skipping download."
          exit 0
        fi
        echo "Downloading Qwen/Qwen3.5-35B-A3B (large, one-time)..."
        python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Qwen/Qwen3.5-35B-A3B', local_dir='/models/Qwen3.5-35B-A3B', local_dir_use_symlinks=False)"
    restart: "no"

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    depends_on:
      model-download:
        condition: service_completed_successfully
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_HOME=/models/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "8000:8000"
    ipc: host
    shm_size: 16gb
    gpus: all
    command:
      - "--model"
      - "/models/Qwen3.5-35B-A3B"
      - "--served-model-name"
      - "qwen3.5-35b"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "262144"
      - "--gpu-memory-utilization"
      - "0.90"
      # Required for OpenAI-compatible clients (e.g. OpenClaw) that send tool_choice: "auto"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
    restart: unless-stopped
