# Qwen3.5-9B + vLLM (dense; ~10B params — closest official Qwen3.5 to “8B”; there is no Qwen3.5-8B on HF).
# Model card: https://huggingface.co/Qwen/Qwen3.5-9B
#
# Use this on a single ~96GB GPU if Qwen3.5-122B FP8 OOMs. For 122B you need multiple GPUs (tensor parallel)
# and/or shorter context; see docker-compose-vllm-gh200-qwen35-122b.yaml.
#
# Platform: linux/arm64 (e.g. GH200). Same Transformers 5 image as other Qwen3.5 stacks (Dockerfile.vllm-openai-qwen35).
#
#   docker compose -f docker-compose-vllm-gh200-qwen35-9b.yaml build vllm
#   docker compose -f docker-compose-vllm-gh200-qwen35-9b.yaml up -d
#
# Env: VLLM_TENSOR_PARALLEL_SIZE, VLLM_MAX_MODEL_LEN (default 131072), VLLM_GPU_MEMORY_UTILIZATION (default 0.92),
# VLLM_HOST_PORT, repo-root .env for HF_TOKEN.

services:
  model-download:
    platform: linux/arm64
    image: python:3.12-slim
    env_file:
      - path: .env
        required: false
    volumes:
      - ./vllm-models:/models
    command:
      - /bin/sh
      - -c
      - |
        set -e
        python -m pip install -q --no-cache-dir huggingface_hub hf_transfer
        export HF_HUB_ENABLE_HF_TRANSFER=1
        if [ -f /models/Qwen3.5-9B/config.json ]; then
          echo "Model already present; skipping download."
          exit 0
        fi
        echo "Downloading Qwen/Qwen3.5-9B..."
        python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Qwen/Qwen3.5-9B', local_dir='/models/Qwen3.5-9B', local_dir_use_symlinks=False)"
    restart: "no"

  vllm:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile.vllm-openai-qwen35
      args:
        VLLM_BASE_IMAGE: ${VLLM_BASE_IMAGE:-vllm/vllm-openai:latest}
        TRANSFORMERS_VERSION: ${TRANSFORMERS_VERSION:-5.5.0}
        HUGGINGFACE_HUB_VERSION: ${HUGGINGFACE_HUB_VERSION:-1.8.0}
    image: ${VLLM_IMAGE:-vllm-openai-qwen35:latest}
    container_name: vllm-qwen35-9b
    env_file:
      - path: .env
        required: false
    depends_on:
      model-download:
        condition: service_completed_successfully
    volumes:
      - ./vllm-models:/models
    environment:
      - HF_HOME=/models/.cache/huggingface
      - PYTORCH_ALLOC_CONF=${PYTORCH_ALLOC_CONF:-expandable_segments:True}
    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"
    ipc: host
    shm_size: 16gb
    gpus: all
    command:
      - "/models/Qwen3.5-9B"
      - "--trust-remote-code"
      - "--served-model-name"
      - "Qwen/Qwen3.5-9B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-131072}"
      - "--reasoning-parser"
      - "qwen3"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.92}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--language-model-only"
    restart: unless-stopped
